{% set python_min = "3.10" %}
{% set version = "4.0.0" %}

package:
  name: pytest-redis
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/p/pytest-redis/pytest_redis-{{ version }}.tar.gz
  sha256: f577be24f0d98fd4c3a81c2fa9fe59977cf394eca5b675758e369f430ffb8414

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}.*
    - setuptools >=61.0.0
    - wheel
    - pip
  run:
    - python >={{ python_min }}
    - pytest >=8.4.0
    - port-for >=0.7.3
    - mirakuru >=2.6.0
    - redis-py >=4.1.0

test:
  imports:
    - pytest_redis
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}.*

about:
  home: https://pypi.org/project/pytest-redis/
  summary: Redis fixtures and fixture factories for Pytest.
  dev_url: https://github.com/dbfixtures/pytest-redis
  license: LGPL-3.0-only AND GPL-3.0-only
  license_file:
    - COPYING
    - COPYING.lesser

extra:
  recipe-maintainers:
    - woutdenolf
